name: TLU Login Tests

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  login-test:
    name: Login test - ${{ matrix.account.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account:
          - name: Account 1
            method: testLoginAccount1
          - name: Account 2
            method: testLoginAccount2

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Run ${{ matrix.account.name }}
        run: mvn test -Dtest=TluLoginTest#${{ matrix.account.method }}
        env:
          CI: true
