name: TLU Selenium Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: selenium-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Chrome / Java 17
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Show Chrome version
        run: google-chrome --version

      - name: Run Selenium tests
        run: bash mvnw --batch-mode --no-transfer-progress clean test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: selenium-test-reports
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14
