name: TLU Login Success

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  login-success:
    name: Test valid login
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run valid login test
        run: bash mvnw --batch-mode --no-transfer-progress -Dtest=tlutest#testLoginSuccess test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tlu-login-success-report
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14
