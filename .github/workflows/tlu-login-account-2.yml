name: TLU Login Account 2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  login-account-2:
    name: Test account 2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"
      TLU_USERNAME: ${{ secrets.TLU_USERNAME }}
      TLU_PASSWORD_2: ${{ secrets.TLU_PASSWORD_2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test login account 2
        run: bash mvnw --batch-mode --no-transfer-progress -Dtest=tlutest#testLoginAccount2 test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tlu-login-account-2-report
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14
